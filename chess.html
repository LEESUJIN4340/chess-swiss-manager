<script>
/* ══════════════ 초기화 ══════════════ */
let db=null, auth=null, configOk=false;
try{
  if(firebaseConfig.apiKey && !firebaseConfig.apiKey.includes('붙여넣기')){
    firebase.initializeApp(firebaseConfig);
    auth=firebase.auth(); db=firebase.firestore(); configOk=true;
  }
}catch(e){ console.error(e); }

/* ══════════════ 상태 ══════════════ */
const S={
  user:null, isChief:false,
  screen:'role',        // role | list | pin | tour
  tournaments:[], tid:null, t:null, results:{}, resultMeta:{}, penalties:{},
  tab:'rounds', judgeOk:false, penRound:null, editPid:null, judgeId:null, progGroup:'', progPid:'', standRound:null, standGroup:'', openLog:null,
  unsubT:null, unsubR:null, unsubP:null, unsubList:null,
};
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=n=>{ if(n===null||n===undefined||isNaN(n))return'-'; return Number.isInteger(n)?String(n):(Math.round(n*100)/100).toString(); };

/* ══════════════ 순위 기준 정의 ══════════════ */
const SCORING_PRESETS=[
  {key:'fide', label:'FIDE 표준 (1·½·0)', win:1, draw:0.5, loss:0, bye:1},
  {key:'three', label:'3점제 (3·1·0)', win:3, draw:1, loss:0, bye:3},
  {key:'kids', label:'유소년 (2·1·0)', win:2, draw:1, loss:0, bye:2},
];
const TIEBREAK_DEFS=[
  {key:'score', label:'총승점 (Total Score)'},
  {key:'buchholz', label:'부흐홀츠 (상대 승점 합)'},
  {key:'buchholzCut1', label:'부흐홀츠-1 (최저 상대 제외)'},
  {key:'sonneborn', label:'손네본-베르거'},
  {key:'direct', label:'승자승 (직접 대결)'},
  {key:'wins', label:'Most Wins (승리 수)'},
  {key:'blacks', label:'흑번 대국 수'},
];
const DEFAULT_CRITERIA=['score','buchholz','sonneborn','direct','wins'];
/* 총승점(score)은 체스 규칙상 반드시 1순위 — 항상 맨 앞으로 강제 */
const critOf=t=>{
  let a=Array.isArray(t.tiebreaks)&&t.tiebreaks.length?[...t.tiebreaks]:[...DEFAULT_CRITERIA];
  a=a.filter(k=>k!=='score');      // 어디에 있든 일단 빼고
  return ['score',...a];           // 맨 앞에 고정
};

/* ══════════════ 계산 로직 ══════════════ */
function getResult(rd, pr){
  if(pr.blackId===null) return 'bye';
  return S.results[`r${rd}_b${pr.board}`] ?? null;
}
function resultPoints(result, side, sc){
  if(!result) return null;
  if(result==='bye') return sc.bye;
  if(result==='1/2') return sc.draw;
  if(result==='1-0') return side==='w'?sc.win:sc.loss;
  if(result==='0-1') return side==='b'?sc.win:sc.loss;
  return null;
}
function buildStats(t){
  const st={};
  (t.players||[]).forEach(p=>{ st[p.id]={player:p, score:0, wins:0, blacks:0, opponents:[], games:[], byes:0, realWins:0}; });
  (t.rounds||[]).forEach(rd=>{
    rd.pairings.forEach(pr=>{
      const res=getResult(rd.number, pr);
      if(!res) return;
      if(res==='bye'){
        const s=st[pr.whiteId];
        if(s){
          s.score+=t.scoring.bye; s.byes++;
          /* FIDE: 부전승은 Most Wins(승수)에 포함 */
          if(t.scoring.bye>=t.scoring.win) s.wins++;
          s.games.push({opp:null, result:'bye', round:rd.number});
        }
        return;
      }
      const w=st[pr.whiteId], b=st[pr.blackId]; if(!w||!b) return;
      w.score+=resultPoints(res,'w',t.scoring); b.score+=resultPoints(res,'b',t.scoring);
      if(res==='1-0'){ w.wins++; w.realWins++; }
      if(res==='0-1'){ b.wins++; b.realWins++; }
      b.blacks++;
      w.opponents.push(pr.blackId); b.opponents.push(pr.whiteId);
      w.games.push({opp:pr.blackId,result:res,side:'w',round:rd.number});
      b.games.push({opp:pr.whiteId,result:res,side:'b',round:rd.number});
    });
  });
  return st;
}
/* FIDE 가상 상대(virtual opponent) 점수
   = 부전승 시점 본인 점수 + (이후 라운드 수 × 0.5) 로 산출하되,
     전체 라운드 수 × 0.5 를 넘지 않도록 상한 적용 */
function virtualOppScore(t, s, byeRound){
  const half=(t.scoring.draw!==undefined?t.scoring.draw:0.5);
  const totalR=(t.rounds||[]).length;
  /* 부전승 라운드까지의 누적 점수 */
  let upto=0;
  s.games.forEach(g=>{
    if(g.round>byeRound) return;
    if(g.result==='bye'){ upto+=t.scoring.bye; return; }
    upto+=resultPoints(g.result,g.side,t.scoring)||0;
  });
  const after=Math.max(0, totalR-byeRound);
  const cap=totalR*half;                  // 상한: 전체 라운드 × 0.5
  return Math.min(upto + after*half, cap);
}
function computeTB(t, st){
  const tb={};
  Object.values(st).forEach(s=>{
    /* 실제 상대 점수 + 부전승은 가상 상대 점수로 대체 */
    const os=s.opponents.map(id=>st[id]?st[id].score:0);
    s.games.filter(g=>g.result==='bye').forEach(g=>{ os.push(virtualOppScore(t,s,g.round)); });
    const buch=os.reduce((a,b)=>a+b,0);
    const cut1=os.length?buch-Math.min(...os):0;
    let sb=0;
    s.games.forEach(g=>{
      if(g.result==='bye'){ sb+=virtualOppScore(t,s,g.round); return; }  // 부전승=승리로 간주
      if(!g.opp)return;
      const o=st[g.opp]?st[g.opp].score:0;
      const my=resultPoints(g.result,g.side,t.scoring);
      if(my===t.scoring.win)sb+=o; else if(my===t.scoring.draw)sb+=o/2;
    });
    tb[s.player.id]={buchholz:buch, buchholzCut1:cut1, sonneborn:sb, wins:s.wins, blacks:s.blacks, realWins:s.realWins, byes:s.byes};
  });
  return tb;
}
/* 라운드별 누적 점수·순위 추이 계산 */
function roundProgress(t){
  const rounds=t.rounds||[];
  const prog={};   // pid → [{round, gained, cum, rank, opp, res}]
  (t.players||[]).forEach(p=>{ prog[p.id]=[]; });
  for(let n=1;n<=rounds.length;n++){
    /* n라운드까지만 반영한 가상 대회로 순위 산출 */
    const partial={...t, rounds:rounds.filter(r=>r.number<=n)};
    const {list}=rankPlayers(partial);
    const rankOf={}; list.forEach((s,i)=>{ rankOf[s.player.id]=i+1; });
    const scoreOf={}; list.forEach(s=>{ scoreOf[s.player.id]=s.score; });
    const rd=rounds.find(r=>r.number===n);
    (t.players||[]).forEach(p=>{
      const prev=prog[p.id].length?prog[p.id][prog[p.id].length-1].cum:0;
      const cum=scoreOf[p.id]??0;
      let opp='', res='', gained=cum-prev;
      if(rd){
        const pr=rd.pairings.find(x=>x.whiteId===p.id||x.blackId===p.id);
        if(pr){
          const r=getResult(n,pr);
          if(pr.blackId===null){ opp='(부전승)'; res=r==='bye'?'F승':''; }
          else{
            const isW=pr.whiteId===p.id;
            opp=pName(isW?pr.blackId:pr.whiteId)+(isW?' (백)':' (흑)');
            if(r==='1/2')res='무';
            else if(r) res=((r==='1-0')===isW)?'승':'패';
          }
        }
      }
      prog[p.id].push({round:n, gained, cum, rank:rankOf[p.id]||0, opp, res});
    });
  }
  return prog;
}
function rankPlayers(t){
  const st=buildStats(t), tb=computeTB(t,st), list=Object.values(st), criteria=critOf(t);
  const direct=(a,b)=>{
    let ap=0,bp=0,met=false;
    a.games.forEach(g=>{ if(g.opp===b.player.id){met=true; ap+=resultPoints(g.result,g.side,t.scoring)||0;} });
    b.games.forEach(g=>{ if(g.opp===a.player.id) bp+=resultPoints(g.result,g.side,t.scoring)||0; });
    return met? bp-ap : 0;
  };
  list.sort((a,b)=>{
    for(const k of criteria){
      if(k==='score'){ if(b.score!==a.score) return b.score-a.score; }
      else if(k==='direct'){ const d=direct(a,b); if(d!==0) return d; }
      else{ const av=tb[a.player.id][k]??0, bv=tb[b.player.id][k]??0; if(bv!==av) return bv-av; }
    }
    return (b.player.rating||0)-(a.player.rating||0);
  });
  return {list, tb, criteria};
}
function generatePairing(t){
  const st=buildStats(t);
  const active=(t.players||[]).filter(p=>p.active!==false);
  const sorted=[...active].sort((a,b)=>{
    const sa=st[a.id]?.score||0, sb=st[b.id]?.score||0;
    if(sb!==sa)return sb-sa; return (b.rating||0)-(a.rating||0);
  });
  const played={}; active.forEach(p=>{ played[p.id]=new Set(st[p.id]?.opponents||[]); });
  let pool=[...sorted], byeP=null;
  if(pool.length%2===1){
    for(let i=pool.length-1;i>=0;i--){ if((st[pool[i].id]?.byes||0)===0){ byeP=pool[i]; pool.splice(i,1); break; } }
    if(!byeP) byeP=pool.pop();
  }
  const cd={};
  active.forEach(p=>{
    const s=st[p.id]; if(!s){cd[p.id]=0;return;}
    const w=s.games.filter(g=>g.side==='w'&&g.result!=='bye').length;
    cd[p.id]=w-s.blacks;
  });
  const pairs=[], used=new Set();
  for(let i=0;i<pool.length;i++){
    const a=pool[i]; if(used.has(a.id))continue;
    let partner=null;
    for(let j=i+1;j<pool.length;j++){ const b=pool[j]; if(!used.has(b.id)&&!played[a.id].has(b.id)){partner=b;break;} }
    if(!partner){ for(let j=i+1;j<pool.length;j++){ const b=pool[j]; if(!used.has(b.id)){partner=b;break;} } }
    if(!partner)continue;
    used.add(a.id); used.add(partner.id);
    let wP=a, bP=partner;
    if((cd[a.id]||0)>(cd[partner.id]||0)){ wP=partner; bP=a; }
    pairs.push({whiteId:wP.id, blackId:bP.id});
  }
  const pairings=pairs.map((p,i)=>({board:i+1, whiteId:p.whiteId, blackId:p.blackId}));
  if(byeP) pairings.push({board:pairings.length+1, whiteId:byeP.id, blackId:null});
  return pairings;
}

/* ══════════════ Firestore ══════════════ */
const col=()=>db.collection('tournaments');
async function saveT(patch){
  await col().doc(S.tid).update(patch);
}
function listenList(){
  if(S.unsubList)S.unsubList();
  S.unsubList=col().orderBy('createdAt','desc').onSnapshot(snap=>{
    S.tournaments=snap.docs.map(d=>({id:d.id, ...d.data()}));
    if(S.screen==='list')render();
  }, err=>{ console.error(err); });
}
function listenTour(tid){
  if(S.unsubT)S.unsubT(); if(S.unsubR)S.unsubR();
  S.unsubT=col().doc(tid).onSnapshot(doc=>{
    if(!doc.exists){ leaveTour(); return; }
    S.t={id:doc.id, ...doc.data()};
    if(S.screen==='tour'||S.screen==='pin')render();
  });
  S.unsubR=col().doc(tid).collection('results').onSnapshot(snap=>{
    const r={}, meta={};
    snap.docs.forEach(d=>{ const v=d.data(); r[d.id]=v.result; meta[d.id]={byName:v.byName||'', at:v.at||0, edited:!!v.edited}; });
    S.results=r; S.resultMeta=meta;
    if(S.screen==='tour')render();
  });
  /* 경고·반칙 기록 — 라운드별로 문서 1개씩 (r{라운드}_p{선수id}) */
  S.unsubP=col().doc(tid).collection('penalties').onSnapshot(snap=>{
    const p={}; snap.docs.forEach(d=>{ p[d.id]=d.data(); });
    S.penalties=p;
    if(S.screen==='tour')render();
  });
}

/* judges: [{id,name,groups:[부문...],boardFrom:n,boardTo:n}] */
function judgeList(){ return (S.t && S.t.judges)||[]; }
function curJudge(){ return judgeList().find(j=>j.id===S.judgeId)||null; }
/* 이 심판이 해당 보드를 담당하는가 */
function canEditBoard(pr, rd){
  if(S.isChief) return true;              // 심판장은 전부 가능
  const j=curJudge();
  if(!j) return true;                     // 배정 미사용 시 전원 가능
  const hasGroup=(j.groups||[]).length>0;
  const hasBoard=j.boardFrom||j.boardTo;
  if(!hasGroup && !hasBoard) return true; // 담당 미지정이면 전체 허용
  if(hasBoard){
    const f=j.boardFrom||1, t=j.boardTo||9999;
    if(pr.board>=f && pr.board<=t) return true;
  }
  if(hasGroup){
    const g=[pr.whiteId,pr.blackId].filter(Boolean)
      .map(id=>{ const p=(S.t.players||[]).find(x=>x.id===id); return p?(p.group||''):''; });
    if(g.some(x=>x && j.groups.includes(x))) return true;
  }
  return false;
}
/* 이 보드를 담당하는 심판 전원 (겹치기 허용) */
function judgeOwners(pr){
  return judgeList().filter(j=>{
    const hasGroup=(j.groups||[]).length>0;
    const hasBoard=j.boardFrom||j.boardTo;
    if(!hasGroup && !hasBoard) return false;   // 전체담당은 표시에서 제외
    if(hasBoard){
      const f=j.boardFrom||1, t=j.boardTo||9999;
      if(pr.board>=f && pr.board<=t) return true;
    }
    if(hasGroup){
      const gs=[pr.whiteId,pr.blackId].filter(Boolean)
        .map(id=>{ const p=(S.t.players||[]).find(x=>x.id===id); return p?(p.group||''):''; });
      if(gs.some(x=>x && j.groups.includes(x))) return true;
    }
    return false;
  });
}
function judgeLabel(pr){
  const arr=judgeOwners(pr);
  if(!arr.length) return '';
  return arr.map(j=>judgeFullName(j)).join('·');
}

async function setResult(rd, board, result){
  const rounds=S.t.rounds||[];
  const isPast=rd<rounds.length;          // 이후 라운드가 이미 페어링됨
  const prev=S.results[`r${rd}_b${board}`];
  if(isPast && prev && prev!==result){
    const ok=confirm(
      `⚠ ${rd}라운드는 이미 종료되고 ${rd+1}라운드 페어링이 만들어진 상태입니다.\n\n`+
      `결과를 고치면 승점·부흐홀츠·순위는 즉시 다시 계산되지만, `+
      `이미 만들어진 ${rd+1}라운드 이후의 페어링은 자동으로 바뀌지 않습니다.\n\n`+
      `FIDE 규정상 이미 시작된 대국은 그대로 진행하고 결과를 인정하며, `+
      `잘못된 승점은 다음 라운드부터 바로잡습니다.\n\n`+
      `수정하시겠습니까?`);
    if(!ok) return;
  }
  const id=`r${rd}_b${board}`;
  const ref=col().doc(S.tid).collection('results').doc(id);
  if(result===null) await ref.delete();
  else await ref.set({result, by:S.user.uid, byName:actorName(), at:Date.now(), edited:isPast&&!!prev});
}
/* ── 경고·반칙 ── */
const penKey=(rd,pid)=>`r${rd}_p${pid}`;
function getPen(rd,pid){
  const d=S.penalties[penKey(rd,pid)];
  return { warn:(d&&d.warn)||0, foul:(d&&d.foul)||0, memo:(d&&d.memo)||'' };
}
/* 선수의 전 라운드 누적 (기록 조회용) */
function penTotal(pid){
  let warn=0, foul=0;
  Object.keys(S.penalties).forEach(k=>{
    if(k.endsWith('_p'+pid)){ const d=S.penalties[k]; warn+=(d.warn||0); foul+=(d.foul||0); }
  });
  return {warn, foul};
}
async function bumpPen(rd, pid, field, delta){
  const cur=getPen(rd,pid);
  const next=Math.max(0,(cur[field]||0)+delta);
  if(next===cur[field]) return;                 // 변화 없으면 기록 안 함
  const ref=col().doc(S.tid).collection('penalties').doc(penKey(rd,pid));
  const entry={
    t:Date.now(), who:actorName(), uid:S.user.uid,
    act:field, from:cur[field]||0, to:next
  };
  await ref.set({
    round:rd, playerId:pid,
    warn: field==='warn'?next:cur.warn,
    foul: field==='foul'?next:cur.foul,
    memo: cur.memo,
    by:S.user.uid, byName:actorName(), at:Date.now(),
    log: firebase.firestore.FieldValue.arrayUnion(entry)
  },{merge:true});
}
async function savePenMemo(rd,pid,val){
  const cur=getPen(rd,pid);
  const v=String(val).trim();
  if(v===(cur.memo||'')) return;
  const ref=col().doc(S.tid).collection('penalties').doc(penKey(rd,pid));
  const entry={ t:Date.now(), who:actorName(), uid:S.user.uid, act:'memo', text:v };
  await ref.set({
    round:rd, playerId:pid, memo:v,
    memoBy:actorName(), memoAt:Date.now(),
    by:S.user.uid, byName:actorName(), at:Date.now(),
    log: firebase.firestore.FieldValue.arrayUnion(entry)
  },{merge:true});
}

/* ── 선수 필드 동의어 매핑 (컬럼명이 달라도 자동 인식) ── */
const FIELD_SYNONYMS={
  name:['이름','성명','선수','선수이름','선수명','참가자','참가자이름','참가선수','참가선수이름','name','playername'],
  group:['부문','부분','그룹','조','부','참가부문','학년','종별','division','group','category'],
  rating:['레이팅','래이팅','등급','점수','레이팅점수','rating','elo'],
  club:['소속','학교','소속학교','클럽','팀','소속팀','기관','club','team','school'],
  phone:['연락처','전화','전화번호','휴대폰','핸드폰','선수연락처','선수전화번호','참가선수연락처','보호자연락처','학부모연락처','phone','tel','mobile','contact'],
};
const normKey=s=>String(s||'').replace(/[\s_\-().]/g,'').toLowerCase();
function matchField(header){
  const h=normKey(header);
  if(!h)return null;
  for(const [field,syns] of Object.entries(FIELD_SYNONYMS)){
    if(syns.some(s=>h===normKey(s))) return field;
  }
  for(const [field,syns] of Object.entries(FIELD_SYNONYMS)){
    if(syns.some(s=>h.includes(normKey(s)))) return field;
  }
  return null;
}
/* 2차원 배열(첫 줄 헤더) → 선수 객체 배열 */
function rowsToPlayers(rows){
  if(!rows||!rows.length) return {players:[], detected:{}, err:'내용이 비어 있습니다.'};
  const header=rows[0].map(c=>String(c==null?'':c).trim());
  const map={}; const detected={};
  header.forEach((h,i)=>{ const f=matchField(h); if(f&&map[f]===undefined){ map[f]=i; detected[f]=h; } });
  let body=rows.slice(1);
  /* 헤더가 없는 경우: 첫 열을 이름으로 간주 */
  if(map.name===undefined){
    map.name=0; detected.name='(첫 번째 열을 이름으로 인식)';
    body=rows;
  }
  const players=[];
  body.forEach(r=>{
    if(!r)return;
    const g=i=>(i===undefined||r[i]==null)?'':String(r[i]).trim();
    const nm=g(map.name);
    if(!nm)return;                                   // 이름 없으면 건너뜀
    const ratingRaw=g(map.rating).replace(/[^0-9]/g,'');
    players.push({
      id:Math.random().toString(36).slice(2,10),
      name:nm,
      group:g(map.group)||'',                        // 비어도 됨
      rating:ratingRaw?parseInt(ratingRaw):0,        // 비어도 됨 → 0
      club:g(map.club)||'',                          // 비어도 됨
      phone:g(map.phone)||'',                        // 비어도 됨
      active:true,
    });
  });
  return {players, detected, err:players.length?'':'이름을 찾을 수 없습니다. 첫 줄에 "이름" 컬럼이 있는지 확인하세요.'};
}

let IMPORT_BUF=null;   // 미리보기 중인 선수 배열
let IMPORT_DET={};     // 인식된 컬럼

function showImportResult(res){
  IMPORT_BUF=res.players.map(p=>({...p, _use:true}));

  if(res.err && !IMPORT_BUF.length){

    return;

function renderImportPreview(){
  const box=$('imp-result'); if(!box||!IMPORT_BUF)return;
  const chosen=IMPORT_BUF.filter(p=>p._use).length;
  const cols=Object.entries(IMPORT_DET).map(([f,h])=>{
    const label={name:'이름',group:'부문',rating:'레이팅',club:'소속',phone:'연락처'}[f];
    return `<span class="pen-tag w" style="margin-right:4px">${label} ← ${esc(h)}</span>`;
  }).join('');
  const missing=['group','rating','club','phone'].filter(f=>!IMPORT_DET[f])
    .map(f=>({group:'부문',rating:'레이팅',club:'소속',phone:'연락처'}[f]));

  /* 중복 이름 표시 (기존 명단 + 목록 내) */
  const existing=new Set((S.t.players||[]).map(p=>p.name));
  const seen={};
  IMPORT_BUF.forEach(p=>{ seen[p.name]=(seen[p.name]||0)+1; });

  const rows=IMPORT_BUF.map((p,i)=>{
    const dupExist=existing.has(p.name);
    const dupSelf=seen[p.name]>1;
    const warn=dupExist?'<span class="pen-tag f" style="margin-left:4px">기존 명단에 있음</span>'
      :(dupSelf?'<span class="pen-tag f" style="margin-left:4px">중복</span>':'');
    const inp=(field,val,w,ph)=>`<input value="${esc(val)}" placeholder="${ph}" style="width:${w};padding:5px 7px;border:1px solid var(--line);border-radius:6px;font-size:13px"
        onchange="editImport(${i},'${field}',this.value)">`;
    return `<tr style="opacity:${p._use?1:.4}">
      <td style="text-align:center"><input type="checkbox" ${p._use?'checked':''} onchange="toggleImport(${i})" style="width:17px;height:17px;cursor:pointer"></td>
      <td class="muted">${i+1}</td>
      <td>${inp('name',p.name,'110px','이름')}${warn}</td>
      <td>${inp('group',p.group,'85px','-')}</td>
      <td>${inp('rating',p.rating||'','65px','-')}</td>
      <td>${inp('club',p.club,'110px','-')}</td>
      <td>${inp('phone',p.phone,'125px','-')}</td>
      <td><button class="btn-d btn-sm" onclick="dropImport(${i})" title="목록에서 제거">✕</button></td>
    </tr>`;
  }).join('');

  box.innerHTML=`
    <div style="margin-top:12px;padding:12px;border:1px solid var(--green);border-radius:8px;background:var(--green-soft)">
      <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-weight:700">📋 읽어온 명단 ${IMPORT_BUF.length}명 · <span style="color:var(--green)">선택 ${chosen}명</span></div>
        <div class="row" style="gap:6px">
          <button class="btn-g btn-sm" onclick="selectAllImport(true)">전체 선택</button>
          <button class="btn-g btn-sm" onclick="selectAllImport(false)">전체 해제</button>
        </div>
      </div>
      <div style="margin-bottom:6px">${cols}</div>
      ${missing.length?`<div class="muted" style="font-size:12px;margin-bottom:8px">인식 안 됨(비워둬도 됩니다): ${missing.join(', ')}</div>`:''}
      <div class="hint" style="margin-bottom:8px">칸을 눌러 직접 고칠 수 있고, 체크를 풀거나 ✕로 제외할 수 있습니다. 확인 후 아래 버튼을 누르세요.</div>
      <div class="overflow" style="max-height:420px;overflow-y:auto;background:var(--white);border-radius:8px">
        <table style="font-size:13px">
          <tr><th style="width:36px"></th><th style="width:34px">#</th><th>이름</th><th>부문</th><th>레이팅</th><th>소속</th><th>연락처</th><th style="width:40px"></th></tr>
          ${rows||'<tr><td colspan="8" class="muted" style="padding:16px">남은 선수가 없습니다.</td></tr>'}
        </table>
      </div>
      <div class="row" style="gap:8px;margin-top:12px">
        <button class="btn-p" onclick="confirmImport(false)" ${chosen?'':'disabled'}>＋ 선택한 ${chosen}명 추가</button>
        <button class="btn-gold" onclick="confirmImport(true)" ${chosen?'':'disabled'}>↻ 기존 명단 교체</button>

      </div>

}
function toggleImport(i){ if(!IMPORT_BUF[i])return; IMPORT_BUF[i]._use=!IMPORT_BUF[i]._use; renderImportPreview(); }
function selectAllImport(v){ IMPORT_BUF.forEach(p=>p._use=v); renderImportPreview(); }
function dropImport(i){ IMPORT_BUF.splice(i,1); renderImportPreview(); }
function editImport(i,field,val){
  if(!IMPORT_BUF[i])return;
  if(field==='rating'){ const n=String(val).replace(/[^0-9]/g,''); IMPORT_BUF[i].rating=n?parseInt(n):0; }
  else IMPORT_BUF[i][field]=String(val).trim();
}
function cancelImport(){
  IMPORT_BUF=null; IMPORT_DET={};
  const b=$('imp-result'); if(b)b.innerHTML='';
  const f=$('imp-file'); if(f)f.value='';
  const t=$('imp-paste'); if(t)t.value='';
}
async function confirmImport(replace){
  if(!IMPORT_BUF)return;
  const picked=IMPORT_BUF.filter(p=>p._use && p.name).map(({_use,...p})=>p);
  if(!picked.length){ alert('선택된 선수가 없습니다.'); return; }
  const cur=S.t.players||[];
  if(replace && cur.length && !confirm(`기존 ${cur.length}명을 지우고 ${picked.length}명으로 교체할까요?`))return;
  await saveT({players:replace?picked:[...cur,...picked]});
  cancelImport();
}
/* 엑셀(.xlsx/.xls) 또는 CSV 파일 */
function importFile(input){
  const file=input.files&&input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false,defval:''});
      showImportResult(rowsToPlayers(rows));
    }catch(err){
      const b=$('imp-result'); if(b)b.innerHTML=`<div style="color:var(--red);font-size:13px;padding:8px 0">파일을 읽을 수 없습니다: ${esc(err.message)}</div>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function importPaste(){
  const txt=$('imp-paste').value;
  if(!txt.trim()){ const b=$('imp-result'); if(b)b.innerHTML='<div class="muted" style="font-size:13px;padding:8px 0">붙여넣은 내용이 없습니다.</div>'; return; }
  const lines=txt.split(/\r?\n/).filter(l=>l.trim());
  const sep=lines[0].includes('\t')?'\t':(lines[0].includes(',')?',':/\s{2,}/);
  const rows=lines.map(l=>l.split(sep).map(c=>c.replace(/^["']|["']$/g,'').trim()));
  showImportResult(rowsToPlayers(rows));
}

async function toggleCrit(key){
  if(key==='score'){ alert('총승점은 순위의 기본 기준이므로 제외할 수 없습니다.'); return; }
  const c=critOf(S.t);
  const next=c.includes(key)?c.filter(k=>k!==key):[...c,key];
  if(next.length<2){ alert('총승점 외에 최소 1개의 타이브레이크가 필요합니다.'); return; }
  await saveT({tiebreaks:next});
}
async function moveCrit(key,dir){
  if(key==='score'){ alert('총승점은 항상 1순위로 고정됩니다.'); return; }
  const a=critOf(S.t); const i=a.indexOf(key), j=i+dir;
  if(i<0||j<0||j>=a.length)return;
  if(j===0){ alert('총승점보다 위로 올릴 수 없습니다.'); return; }  // 1순위 자리 침범 방지
  [a[i],a[j]]=[a[j],a[i]];
  await saveT({tiebreaks:a});
}
async function saveBasic(){

function exportResults(){
  const t=S.t;
  const wb=XLSX.utils.book_new();
  (t.rounds||[]).forEach(rd=>{
    const rows=[['보드','백 (White)','레이팅','결과','흑 (Black)','레이팅']];
    rd.pairings.forEach(pr=>{
      const res=getResult(rd.number,pr);
      if(pr.blackId===null){ rows.push([pr.board, pName(pr.whiteId), pRating(pr.whiteId)||'', 'F (부전승)', '', '']); return; }
      const disp=res==='1-0'?'1 - 0':res==='0-1'?'0 - 1':res==='1/2'?'½ - ½':'미입력';
      rows.push([pr.board, pName(pr.whiteId), pRating(pr.whiteId)||'', disp, pName(pr.blackId), pRating(pr.blackId)||'']);
    });
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:5},{wch:18},{wch:8},{wch:9},{wch:18},{wch:8}];
    XLSX.utils.book_append_sheet(wb, ws, `${rd.number}라운드`);

function exportPenalties(){
  const t=S.t;
  const rounds=t.rounds||[];
  const wb=XLSX.utils.book_new();

  /* 시트1: 라운드 × 선수 요약 */
  const head=['이름',...rounds.map(rd=>`${rd.number}R 경고`),...rounds.map(rd=>`${rd.number}R 반칙`),'경고 누적','반칙 누적'];
  const body=(t.players||[]).map(p=>{
    const tot=penTotal(p.id);
    return [p.name,
      ...rounds.map(rd=>getPen(rd.number,p.id).warn||''),
      ...rounds.map(rd=>getPen(rd.number,p.id).foul||''),
      tot.warn||'', tot.foul||''];
  }).filter(r=>r.slice(1).some(v=>v!==''));
  const ws1=XLSX.utils.aoa_to_sheet([head, ...(body.length?body:[['기록 없음']])]);
  ws1['!cols']=[{wch:16},...head.slice(1).map(()=>({wch:9}))];
  XLSX.utils.book_append_sheet(wb, ws1, '경고반칙 요약');

  /* 시트2: 상세 이력 (사유 메모 + 기록자 포함) */
  const det=[['라운드','선수','경고','반칙','사유 메모','기록 심판','기록 시각']];
  rounds.forEach(rd=>{
    (t.players||[]).forEach(p=>{
      const d=S.penalties[penKey(rd.number,p.id)];
      if(!d||(!d.warn&&!d.foul&&!d.memo))return;
      det.push([rd.number, p.name, d.warn||0, d.foul||0, d.memo||'', d.byName||'',
        d.at?new Date(d.at).toLocaleString('ko-KR'):'']);
    });
  });
  const ws2=XLSX.utils.aoa_to_sheet(det.length>1?det:[det[0],['기록 없음']]);
  ws2['!cols']=[{wch:8},{wch:16},{wch:7},{wch:7},{wch:40},{wch:14},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws2, '상세 이력');

  /* 시트3: 전체 기록 로그 (누가 언제 무엇을 했는지 — 항의 대응 근거) */
  const log=[['일시','기록자','라운드','선수','구분','내용']];
  rounds.forEach(rd=>{
    (t.players||[]).forEach(p=>{
      penLog(rd.number,p.id).slice().reverse().forEach(e=>{
        const kind=e.act==='warn'?'경고':(e.act==='foul'?'반칙':'사유 작성');
        const body=e.act==='memo'?(e.text||''):`${e.from} → ${e.to}${e.to>e.from?' (부여)':' (취소)'}`;
        log.push([new Date(e.t).toLocaleString('ko-KR'), e.who||'', rd.number, p.name, kind, body]);
      });
    });
  });
  const ws3=XLSX.utils.aoa_to_sheet(log.length>1?log:[log[0],['기록 없음']]);
  ws3['!cols']=[{wch:20},{wch:14},{wch:8},{wch:14},{wch:10},{wch:40}];
  XLSX.utils.book_append_sheet(wb, ws3, '기록 로그');

  dl(wb, `${t.name}_경고반칙기록.xlsx`);
}

  const isChief=S.isChief;
  if(!isChief && !S.judgeOk){ S.screen='pin'; return renderPin(app); }
  if(!isChief && (S.tab==='settings'||S.tab==='players'||S.tab==='export')) S.tab='rounds';

  const tabs=[
    ...(isChief?[['settings','⚙ 설정'],['players','👥 선수']]:[]),
    ['rounds','⚔ 라운드·결과'],['penalties','⚠ 경고·반칙 기록'],['standings','🏆 순위표'],['progress','📈 라운드별 누적'],
    ...(isChief?[['export','⬇ 내보내기']]:[]),
  ];
  const tabHtml=tabs.map(([k,l])=>`<button class="tab ${S.tab===k?'on':''}" onclick="S.tab='${k}';render()">${l}</button>`).join('');

  let body='';
  if(S.tab==='settings') body=viewSettings(t);
  else if(S.tab==='players') body=viewPlayers(t);
  else if(S.tab==='rounds') body=viewRounds(t, isChief);
  else if(S.tab==='penalties') body=viewPenalties(t, isChief);
  else if(S.tab==='standings') body=viewStandings(t);
  else if(S.tab==='progress') body=viewProgress(t);
  else if(S.tab==='export') body=viewExport(t);

  app.innerHTML=`
    <div style="margin-bottom:14px">
      <div class="row" style="gap:10px">
        <span style="font-size:19px;font-weight:800">${esc(t.name)}</span>
        <span class="badge ${isChief?'chief':'judge'}">${isChief?'심판장':(curJudge()?esc(judgeFullName(curJudge()))+' 심판':'심판')}</span>
        ${(!isChief&&curJudge())?(()=>{
          const j=curJudge(); const sc=[];
          if((j.groups||[]).length) sc.push(j.groups.join('·'));
          if(j.boardFrom||j.boardTo) sc.push(`B${j.boardFrom||1}~${j.boardTo||'끝'}`);
          return sc.length?`<span class="pen-tag w">담당 ${esc(sc.join(' / '))}</span>`:'';
        })():''}
      </div>
      <div class="muted">총 ${t.roundsTotal}R · 진행 ${(t.rounds||[]).length}R · 선수 ${(t.players||[]).length}명 · 승점 ${fmt(t.scoring.win)}/${fmt(t.scoring.draw)}/${fmt(t.scoring.loss)} (부전 ${fmt(t.scoring.bye)})</div>
    </div>
    <div class="tabs">${tabHtml}</div>
    ${body}`;
}

function viewSettings(t){
  const c=critOf(t);
  /* 심판 배정 목록 */
  const allGroups=[...new Set((t.players||[]).map(p=>p.group).filter(Boolean))];
  const judgeRows=(t.judges||[]).map(j=>{
    const chips=allGroups.map(g=>{
      const on=(j.groups||[]).includes(g);
      return `<button class="pill ${on?'on':''}" style="font-size:12px;padding:4px 10px"
        onclick="toggleJudgeGroup('${j.id}','${esc(g)}')">${esc(g)}</button>`;
    }).join('');
    return `<div class="list-item" style="flex-direction:column;align-items:stretch;gap:8px">
      <div class="row" style="justify-content:space-between;align-items:center">
        <div class="row" style="gap:6px;align-items:center">
          <span style="font-size:15px">⚖</span>
          <input value="${esc(j.label||'')}" placeholder="분류(예: 초등부)" title="심판 이름 앞에 표시됩니다"
            style="width:110px;padding:5px 8px;border:1px solid var(--line);border-radius:6px;font-size:13px;font-weight:700;color:var(--gold)"
            onchange="updJudgeLabel('${j.id}',this.value)">
          <b style="font-size:14px">${esc(j.name)}</b>
        </div>
        <button class="btn-d btn-sm" onclick="removeJudge('${j.id}')">삭제</button>
      </div>
      ${allGroups.length?`<div class="row" style="gap:4px;align-items:center">
        <span class="muted" style="font-size:12px;min-width:60px">담당 부문</span>${chips}</div>`:''}
      <div class="row" style="gap:6px;align-items:center">
        <span class="muted" style="font-size:12px;min-width:60px">담당 보드</span>
        <input type="number" min="0" value="${j.boardFrom||''}" placeholder="시작" style="width:70px;padding:5px 7px;border:1px solid var(--line);border-radius:6px;font-size:13px"
          onchange="updJudge('${j.id}','boardFrom',this.value)">
        <span class="muted">~</span>
        <input type="number" min="0" value="${j.boardTo||''}" placeholder="끝" style="width:70px;padding:5px 7px;border:1px solid var(--line);border-radius:6px;font-size:13px"
          onchange="updJudge('${j.id}','boardTo',this.value)">
        <span class="muted" style="font-size:12px">번 보드 (비우면 부문 기준만 적용)</span>
      </div>
    </div>`;
  }).join('');
  const presets=SCORING_PRESETS.map((p,i)=>{
    const on=p.win===t.scoring.win&&p.draw===t.scoring.draw&&p.loss===t.scoring.loss&&p.bye===t.scoring.bye;
    return `<button class="pill ${on?'on':''}" onclick="applyPreset(${i})">${p.label}</button>`;
  }).join('');
  const scInputs=[['win','승'],['draw','무'],['loss','패'],['bye','부전승']].map(([f,l])=>`
    <label class="fld" style="text-align:center">${l}
      <input id="sc-${f}" class="num" type="number" step="0.5" value="${t.scoring[f]}" onchange="setScoring('${f}')">
    </label>`).join('');
  const critOn=c.map((k,i)=>{
    const d=TIEBREAK_DEFS.find(x=>x.key===k);
    if(k==='score'){
      return `<div class="crit-item" style="background:var(--gold-soft);border-color:var(--gold)">
        <div style="font-size:14px"><b style="color:var(--gold);margin-right:8px">1</b>🔒 ${d?d.label:k}
          <span class="muted" style="font-size:12px;margin-left:6px">항상 1순위 고정 (체스 규칙)</span></div>
      </div>`;
    }
    return `<div class="crit-item">
      <div style="font-size:14px"><b style="color:var(--green);margin-right:8px">${i+1}</b>✓ ${d?d.label:k}</div>
      <div class="row" style="gap:4px">
        <button class="btn-g btn-sm" onclick="moveCrit('${k}',-1)" ${i<=1?'disabled':''}>↑</button>
        <button class="btn-g btn-sm" onclick="moveCrit('${k}',1)" ${i===c.length-1?'disabled':''}>↓</button>
        <button class="btn-d btn-sm" onclick="toggleCrit('${k}')">제외</button>
      </div>
    </div>`;
  }).join('');
  const critOff=TIEBREAK_DEFS.filter(d=>d.key!=='score'&&!c.includes(d.key)).map(d=>
    `<button class="crit-off" onclick="toggleCrit('${d.key}')">○ ${d.label} — 클릭해서 추가</button>`).join('');
  return `
    <div class="card">
      <div class="stitle">대회 정보 · 심판 PIN</div>
      <label class="fld" style="margin-bottom:10px">대회명<input id="t-name" value="${esc(t.name)}"></label>
      <div class="row" style="align-items:flex-end">
        <label class="fld">총 라운드<input id="t-rounds" class="num" type="number" value="${t.roundsTotal}"></label>
        <label class="fld">심판 PIN<input id="t-jpin" style="width:120px;text-align:center" value="${esc(t.judgePin)}"></label>
        <button class="btn-p" onclick="saveBasic()">저장</button>
        <span class="ok" id="basic-ok"></span>
      </div>
      <div class="hint" style="margin-top:8px">심판장 계정(이메일·비밀번호)은 Firebase 콘솔에서 관리되며, 이 화면·데이터 어디에도 저장되지 않습니다. 설정 변경은 서버 규칙상 심판장 계정만 가능합니다.</div>
    </div>

    <div class="card">
      <div class="stitle">⚖ 심판 배정 <span class="muted">· 담당 보드만 입력 가능</span></div>
      <div class="hint">심판을 등록하고 담당을 지정하면, 심판이 입장할 때 본인 이름을 선택하고 <b>자기 담당 보드만 입력</b>할 수 있습니다. 다른 보드는 회색으로 보이며 눌러지지 않아 오입력이 방지됩니다. <b>분류</b>(초등부·3학년 등)는 이름 앞에 표시되어 심판이 여럿일 때 구분이 쉽습니다. 부문과 보드 범위는 <b>둘 중 하나만 넣어도 되고 함께 써도 됩니다</b>(하나라도 해당하면 담당). 둘 다 비우면 전체 담당입니다.</div>
      <div class="row" style="margin-bottom:12px">
        <input id="j-label" style="width:130px" placeholder="분류(예: 초등부)" onkeydown="if(event.key==='Enter')addJudge()">
        <input id="j-name" class="grow" placeholder="심판 이름" onkeydown="if(event.key==='Enter')addJudge()">
        <button class="btn-p" onclick="addJudge()">심판 추가</button>
      </div>
      ${judgeRows||'<div class="muted">심판을 추가하지 않으면 모든 심판이 전체 보드를 입력할 수 있습니다.</div>'}
    </div>
    <div class="card gold">
      <div class="stitle">승점 기준 <span class="muted" style="color:var(--gold)">· 대회마다 다르게 설정</span></div>
      <div class="hint">순위표와 부흐홀츠·손네본-베르거 계산이 모두 이 기준을 따릅니다.${(t.rounds||[]).length?' <span style="color:var(--red)">라운드 시작 후 변경 시 기존 결과도 재계산됩니다.</span>':''}</div>
      <div class="row" style="margin-bottom:12px">${presets}</div>
      <div class="row" style="gap:16px">${scInputs}</div>
    </div>
    <div class="card green">
      <div class="stitle">순위 결정 기준 <span class="muted" style="color:var(--green)">· 적용 순서대로</span></div>
      <div class="hint">위에서부터 순서대로 적용해 순위를 가립니다. 모든 기준이 동률이면 레이팅 순.</div>
      ${critOn}${critOff}
    </div>`;
}

function viewPlayers(t){
  const started=(t.rounds||[]).length>0;
  const list=t.players||[];
  /* 부문별 인원 요약 */
  const byGroup={};
  list.forEach(p=>{ const g=p.group||'미지정'; byGroup[g]=(byGroup[g]||0)+1; });
  const groupTags=Object.keys(byGroup).length>1
    ? Object.entries(byGroup).map(([g,n])=>`<span class="pen-tag w" style="margin-right:4px">${esc(g)} ${n}명</span>`).join('')
    : '';

  const rows=list.map(p=>{
    const editing=S.editPid===p.id;
    if(editing){
      return `<div class="list-item" style="flex-wrap:wrap;gap:6px;background:var(--green-soft)">
        <input id="e-name" value="${esc(p.name)}" placeholder="이름 *" style="width:110px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:13px">
        <input id="e-group" value="${esc(p.group||'')}" placeholder="부문" style="width:85px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:13px">
        <input id="e-rating" value="${p.rating||''}" placeholder="레이팅" type="number" style="width:75px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:13px">
        <input id="e-club" value="${esc(p.club||'')}" placeholder="소속" style="width:110px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:13px">
        <input id="e-phone" value="${esc(p.phone||'')}" placeholder="연락처" style="width:125px;padding:6px 8px;border:1px solid var(--line);border-radius:6px;font-size:13px">
        <button class="btn-p btn-sm" onclick="saveEditPlayer('${p.id}')">저장</button>
        <button class="btn-g btn-sm" onclick="S.editPid=null;render()">취소</button>
      </div>`;
    }
    return `
    <div class="list-item" style="opacity:${p.active===false?.45:1}">
      <div style="font-size:14px">
        <b>${esc(p.name)}</b>
        ${p.group?`<span class="pen-tag w" style="margin-left:6px">${esc(p.group)}</span>`:''}
        <span class="muted" style="margin-left:6px">${p.rating?'R'+p.rating:'무레이팅'}</span>
        ${p.club?`<span class="muted"> · ${esc(p.club)}</span>`:''}
        ${p.phone?`<span class="muted"> · ☎ ${esc(p.phone)}</span>`:''}
        ${p.active===false?'<span style="color:var(--red);font-size:12px"> 기권</span>':''}
      </div>
      <div class="row" style="gap:6px">
        <button class="btn-g btn-sm" onclick="S.editPid='${p.id}';render()">수정</button>
        ${started
          ?`<button class="btn-g btn-sm" onclick="togglePlayer('${p.id}')">${p.active===false?'복귀':'기권 처리'}</button>`
          :`<button class="btn-d btn-sm" onclick="removePlayer('${p.id}')">삭제</button>`}
      </div>
    </div>`;
  }).join('');

  return `
    <div class="card">
      <div class="stitle">📥 명단 한 번에 가져오기</div>
      <div class="hint">엑셀·CSV 파일을 올리거나, 엑셀에서 복사해 붙여넣으세요. 첫 줄의 컬럼 이름(이름/선수이름/성명, 연락처/전화번호/선수연락처 등)은 <b>표현이 달라도 자동 인식</b>합니다. <b>부문·레이팅·소속·연락처는 비어 있어도 됩니다.</b></div>
      <div class="row" style="gap:10px;margin-bottom:10px">
        <label class="btn-p" style="display:inline-flex;align-items:center;cursor:pointer;padding:10px 16px;border-radius:8px">
          📄 엑셀·CSV 파일 선택
          <input id="imp-file" type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="importFile(this)">
        </label>
        <button class="btn-g" onclick="downloadTemplate()">⬇ 양식 내려받기</button>
      </div>
      <div class="hint" style="margin-bottom:6px">또는 엑셀에서 범위를 복사해 아래에 붙여넣으세요 (Ctrl+V)</div>
      <textarea id="imp-paste" rows="4" placeholder="이름	부문	레이팅	소속	연락처
홍길동	초등부	1200	생각키움	010-0000-0000
김철수	중등부			"
        style="width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit"></textarea>
      <div class="row" style="margin-top:8px"><button class="btn-p" onclick="importPaste()">붙여넣은 내용 읽기</button></div>
      <div id="imp-result"></div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="stitle" style="margin:0">선수 등록 (${list.length}명) ${groupTags}</div>
        ${(!started && list.length)?`<button class="btn-d btn-sm" onclick="clearAllPlayers()">전체 삭제</button>`:''}
      </div>
      <div class="row" style="margin-bottom:6px">
        <input id="p-name" class="grow" placeholder="선수 이름 *" onkeydown="if(event.key==='Enter')addPlayer()">
        <input id="p-group" style="width:120px" placeholder="부문(선택)" onkeydown="if(event.key==='Enter')addPlayer()">
        <input id="p-rating" style="width:110px" type="number" placeholder="레이팅(선택)" onkeydown="if(event.key==='Enter')addPlayer()">
      </div>
      <div class="row" style="margin-bottom:12px">
        <input id="p-club" class="grow" placeholder="소속(선택)" onkeydown="if(event.key==='Enter')addPlayer()">
        <input id="p-phone" class="grow" placeholder="연락처(선택 · 심판장만 표시)" onkeydown="if(event.key==='Enter')addPlayer()">
        <button class="btn-p" onclick="addPlayer()">추가</button>
      </div>
      ${rows||'<div class="muted">선수를 추가하세요. 이름만 넣어도 등록됩니다. 대회 시작 후에는 삭제 대신 기권 처리를 사용합니다.</div>'}
    </div>`;
}

function viewRounds(t, isChief){
  const rounds=t.rounds||[];
  const currentDone=!rounds.length || rounds[rounds.length-1].pairings.every(pr=>getResult(rounds.length,pr)!==null);
  const canNext=currentDone && rounds.length<t.roundsTotal;
  /* 페어링 후 수정된 결과 목록 (심판장 확인용) */
  const edits=[];
  rounds.forEach(rd=>rd.pairings.forEach(pr=>{
    const m=S.resultMeta[`r${rd.number}_b${pr.board}`];
    if(m&&m.edited) edits.push(`${rd.number}R B${pr.board}`);
  }));
  const editBanner=edits.length?`
    <div class="card" style="border-color:var(--red);background:#FCF3F1">
      <div style="font-weight:700;color:var(--red);margin-bottom:4px">✎ 페어링 후 수정된 결과 ${edits.length}건</div>
      <div style="font-size:13px;color:#666">${edits.join(' · ')}</div>
      <div class="hint" style="margin-top:6px">승점·순위는 다시 계산되었습니다. FIDE 규정상 이미 시작된 대국은 그대로 진행하며, 수정된 승점은 <b>다음 라운드 페어링부터</b> 반영됩니다.</div>
    </div>`:'';
  const top=editBanner+`
    <div class="card">
      <div class="row" style="justify-content:space-between">
        <div style="font-size:14px">진행: <b>${rounds.length}</b> / ${t.roundsTotal} 라운드
          ${!currentDone?'<span style="color:var(--gold);margin-left:6px">결과 입력 중</span>':''}</div>
        ${isChief
          ?`<button class="btn-gold" onclick="startNextRound()" ${canNext?'':'disabled'}>⇄ ${rounds.length===0?'1라운드':(rounds.length+1)+'라운드'} 페어링 생성</button>`
          :'<span class="muted">페어링 생성은 심판장이 진행합니다</span>'}
      </div>
    </div>`;
  const cards=rounds.map(rd=>{
    const done=rd.pairings.filter(pr=>getResult(rd.number,pr)!==null).length;
    /* 담당 보드를 맨 위로 — 심판이 자기 보드를 바로 찾을 수 있게 */
    const sortedPairs=[...rd.pairings].sort((a,b)=>{
      const am=canEditBoard(a,rd.number)?0:1, bm=canEditBoard(b,rd.number)?0:1;
      if(am!==bm)return am-bm;
      return a.board-b.board;
    });
    const myCount=S.isChief?0:sortedPairs.filter(p=>canEditBoard(p,rd.number)).length;
    const boards=sortedPairs.map(pr=>{
      const res=getResult(rd.number,pr);
      if(pr.blackId===null){
        return `<div class="board done"><div style="font-size:14px">
          <b style="color:var(--green);margin-right:8px">B${pr.board}</b>
          <b>${esc(pName(pr.whiteId))}</b> <span style="color:var(--gold);font-weight:700">F 부전승 (+${fmt(t.scoring.bye)})</span></div></div>`;
      }
      const mine=canEditBoard(pr, rd.number);
      const btn=(val,label)=>`<button class="rbtn ${res===val?'on':''}" ${mine?'':'disabled'}
        onclick="${mine?`setResult(${rd.number},${pr.board},${res===val?'null':`'${val}'`})`:''}">${label}</button>`;
      const penBox=(pid,label)=>{
        const p=getPen(rd.number,pid);
        const d=S.penalties[penKey(rd.number,pid)]||{};
        const has=p.warn||p.foul;
        const ctr=(f,ico,txt,color)=>`
          <span class="pen-ctr">
            <span class="pen-lbl" style="color:${color}">${ico} ${txt}</span>
            <button class="pen-btn" ${mine&&p[f]?'':'disabled'} onclick="${mine?`bumpPen(${rd.number},'${pid}','${f}',-1)`:''}">−</button>
            <b class="pen-num ${p[f]?'hot':''}">${p[f]}</b>
            <button class="pen-btn" ${mine?'':'disabled'} onclick="${mine?`bumpPen(${rd.number},'${pid}','${f}',1)`:''}">＋</button>
          </span>`;
        return `<div class="pen-row" style="flex-wrap:wrap">
          <span class="pen-name">${label} ${esc(pName(pid))}</span>
          ${ctr('warn','⚠','경고','var(--gold)')}
          ${ctr('foul','⛔','반칙','var(--red)')}
          ${has?`<span class="muted" style="font-size:11px">${d.byName?'✓ '+esc(d.byName):''}</span>`:''}
          ${has?`<input class="pen-memo" style="flex-basis:100%;margin-top:4px" value="${esc(p.memo)}"
              placeholder="사유를 적어주세요 (예: 터치무브 위반, 기물 넘어뜨림)"
              ${mine?'':'disabled'} onchange="${mine?`savePenMemo(${rd.number},'${pid}',this.value)`:''}">`:''}
          ${(has&&d.memoBy)?`<span class="muted" style="font-size:11px">✎ ${esc(d.memoBy)} 작성${d.memoAt?' · '+new Date(d.memoAt).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}):''}</span>`:''}
        </div>`;
      };
      const owners=judgeOwners(pr);
      const ownerTxt=owners.length?owners.map(j=>judgeFullName(j)).join('·'):'';
      const meta=S.resultMeta[`r${rd.number}_b${pr.board}`];
      return `<div class="board ${res?'done':''} ${mine?'':'notmine'}">
        <div style="font-size:14px">
          <b style="color:var(--green);margin-right:8px">B${pr.board}</b>
          <span class="wtag">백</span> <b>${esc(pName(pr.whiteId))}</b>
          <span style="color:#aaa;margin:0 6px">vs</span>
          <span class="btag">흑</span> <b>${esc(pName(pr.blackId))}</b>
          ${ownerTxt?`<span class="pen-tag ${mine?'w':'f'}" style="margin-left:6px">${esc(ownerTxt)}${owners.length>1?' 공동':''} 담당</span>`:''}
          ${(!mine&&!ownerTxt)?`<span class="pen-tag f" style="margin-left:6px">담당 아님</span>`:''}
          ${(meta&&meta.byName)?`<span class="muted" style="font-size:11px;margin-left:6px">✓ ${esc(meta.byName)} 입력</span>`:''}
          ${(meta&&meta.edited)?`<span class="pen-tag f" style="margin-left:4px" title="페어링 후 수정됨">✎ 사후수정</span>`:''}
        </div>
        <div class="row" style="gap:4px">${btn('1-0','백 승')}${btn('1/2','무')}${btn('0-1','흑 승')}</div>
        <div class="pen-wrap">
          ${penBox(pr.whiteId,'백')}
          ${penBox(pr.blackId,'흑')}
        </div>
      </div>`;
    }).join('');
    return `<div class="card">
      <div class="stitle">⚔ ${rd.number}라운드 <span class="muted">(${done}/${rd.pairings.length} 입력)</span>
        ${myCount?`<span class="pen-tag w" style="margin-left:6px">내 담당 ${myCount}보드 (맨 위)</span>`:''}</div>
      ${boards}</div>`;
  }).reverse().join('');
  return top + (cards || '<div class="card"><div class="muted">선수 등록 후 페어링을 생성하면 라운드가 시작됩니다.</div></div>');
}

function viewPenalties(t, isChief){
  const rounds=t.rounds||[];
  if(!rounds.length){
    return `<div class="card"><div class="stitle">⚠ 경고·반칙 기록</div>
      <div class="muted">라운드가 시작되면 기록할 수 있습니다. 경고·반칙은 「라운드·결과」 탭의 각 대국 카드에서 ＋ 버튼으로 입력합니다.</div></div>`;
  }
  const cur=S.penRound===null?rounds.length:S.penRound;

  /* 라운드 선택 버튼 */
  const rbtns=rounds.map(rd=>{
    const cnt=(t.players||[]).reduce((a,p)=>{const x=getPen(rd.number,p.id); return a+x.warn+x.foul;},0);
    return `<button class="tab ${cur===rd.number?'on':''}" onclick="setPenRound('${rd.number}')">
      ${rd.number}R${cnt?` <span class="pen-tag f">${cnt}</span>`:''}</button>`;
  }).join('');

  /* 선택 라운드의 기록 */
  const rows=(t.players||[]).map(p=>{
    const x=getPen(cur,p.id);
    if(!x.warn && !x.foul && !x.memo) return '';
    const d=S.penalties[penKey(cur,p.id)]||{};
    const lg=penLog(cur,p.id);
    const open=S.openLog===`${cur}_${p.id}`;
    const logRow=open?`<tr><td colspan="6" style="background:var(--bg);padding:10px 14px">
      <div style="font-weight:700;font-size:12px;margin-bottom:6px">📜 기록 이력 (${lg.length}건)</div>
      ${lg.length?lg.map(e=>{
        const ico=e.act==='warn'?'⚠ 경고':(e.act==='foul'?'⛔ 반칙':'✎ 사유');
        const chg=e.act==='memo'?`"${esc(e.text||'')}"`:`${e.from} → ${e.to}${e.to>e.from?' (부여)':' (취소)'}`;
        return `<div style="font-size:12px;padding:3px 0;border-bottom:1px dashed var(--line)">
          <span style="color:#888">${new Date(e.t).toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</span>
          <b style="margin:0 6px">${esc(e.who||'?')}</b>
          <span>${ico} ${chg}</span>
        </div>`;
      }).join(''):'<div class="muted" style="font-size:12px">이력이 없습니다. (이전 버전에서 기록된 항목)</div>'}
    </td></tr>`:'';
    return `<tr>
      <td style="font-weight:700">${esc(p.name)}</td>
      <td style="text-align:center;color:${x.warn?'var(--gold)':'#ccc'};font-weight:800">${x.warn}</td>
      <td style="text-align:center;color:${x.foul?'var(--red)':'#ccc'};font-weight:800">${x.foul}</td>
      <td>${isChief
        ? `<input class="pen-memo" value="${esc(x.memo)}" placeholder="사유 메모"
             onchange="savePenMemo(${cur},'${p.id}',this.value)">`
        : `<span class="muted">${esc(x.memo)||'-'}</span>`}
        ${d.memoBy?`<div class="muted" style="font-size:11px">✎ ${esc(d.memoBy)} 작성</div>`:''}</td>
      <td class="muted" style="font-size:12px;white-space:nowrap">${esc(d.byName||'-')}${d.at?`<br><span style="font-size:11px;color:#bbb">${new Date(d.at).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</span>`:''}</td>
      <td style="text-align:center"><button class="btn-g btn-sm" onclick="togglePenLog(${cur},'${p.id}')">${open?'접기':`이력 ${lg.length}`}</button></td>
    </tr>${logRow}`;
  }).filter(Boolean).join('');

  /* 대회 전체 누적 */
  const totals=(t.players||[]).map(p=>({p, ...penTotal(p.id)}))
    .filter(x=>x.warn||x.foul)
    .sort((a,b)=>(b.warn+b.foul)-(a.warn+a.foul));
  const totalRows=totals.map(x=>{
    const per=rounds.map(rd=>{
      const y=getPen(rd.number,x.p.id);
      if(!y.warn && !y.foul) return '';
      return `${rd.number}R(${y.warn?'⚠'+y.warn:''}${y.warn&&y.foul?' ':''}${y.foul?'⛔'+y.foul:''})`;
    }).filter(Boolean).join(' · ');
    return `<tr>
      <td style="font-weight:700">${esc(x.p.name)}</td>
      <td style="text-align:center;color:var(--gold);font-weight:800">${x.warn}</td>
      <td style="text-align:center;color:var(--red);font-weight:800">${x.foul}</td>
      <td class="muted" style="font-size:12.5px">${per}</td>
    </tr>`;
  }).join('');

  return `
  <div class="card">
    <div class="stitle">⚠ 라운드별 경고·반칙</div>
    <div class="hint">경고·반칙과 <b>사유는 담당 심판이 직접</b> 「라운드·결과」 탭의 대국 카드에서 입력합니다. 카운트는 <b>라운드마다 0부터 새로 시작</b>하며 지난 기록은 그대로 보존됩니다. 모든 기록에 <b>누가 언제 했는지가 남으며</b>, 오른쪽 「이력」 버튼으로 확인할 수 있습니다.</div>
    <div class="tabs" style="margin-bottom:12px">${rbtns}</div>
    <div class="overflow"><table>
      <tr><th>선수</th><th style="text-align:center">⚠ 경고</th><th style="text-align:center">⛔ 반칙</th><th>사유 메모</th><th>최종 기록자</th><th style="text-align:center">이력</th></tr>
      ${rows||`<tr><td colspan="6" class="muted" style="padding:16px">${cur}라운드에 기록된 경고·반칙이 없습니다.</td></tr>`}
    </table></div>
  </div>

  <div class="card">
    <div class="stitle">📋 대회 전체 누적 <span class="muted">항의 대응·심판장 판단용</span></div>
    <div class="overflow"><table>
      <tr><th>선수</th><th style="text-align:center">⚠ 누적</th><th style="text-align:center">⛔ 누적</th><th>라운드별 상세</th></tr>
      ${totalRows||'<tr><td colspan="4" class="muted" style="padding:16px">아직 기록된 경고·반칙이 없습니다.</td></tr>'}
    </table></div>
    <div class="hint" style="margin-top:10px">자동 실격·몰수 처리는 하지 않습니다. 누적 기록을 근거로 심판장이 판단하여, 필요 시 「선수」 탭의 기권 처리나 해당 대국 결과 수정으로 반영하세요.</div>
  </div>`;
}

function viewProgress(t){
  const rounds=t.rounds||[];
  if(!rounds.length) return `<div class="card"><div class="stitle">📈 라운드별 누적</div>
    <div class="muted">라운드가 진행되면 선수별 누적 점수와 순위 변동이 여기에 표시됩니다.</div></div>`;
  const prog=roundProgress(t);
  const {list}=rankPlayers(t);
  const nums=rounds.map(r=>r.number);

  /* 부문 필터 */
  const allGroups=[...new Set((t.players||[]).map(p=>p.group).filter(Boolean))];
  const gf=S.progGroup||'';
  const gBtns=allGroups.length?`<div class="row" style="gap:4px;margin-bottom:10px">
    <button class="pill ${gf?'':'on'}" onclick="S.progGroup='';render()">전체</button>
    ${allGroups.map(g=>`<button class="pill ${gf===g?'on':''}" onclick="S.progGroup='${esc(g)}';render()">${esc(g)}</button>`).join('')}
  </div>`:'';

  const shown=list.filter(s=>!gf||s.player.group===gf);

  const head=`<tr><th style="text-align:center">순위</th><th>선수</th>
    ${nums.map(n=>`<th style="text-align:center">${n}R</th>`).join('')}
    <th style="text-align:center;color:var(--green)">합계</th></tr>`;

  const rows=shown.map((s,i)=>{
    const rec=prog[s.player.id]||[];
    const cells=nums.map(n=>{
      const e=rec.find(x=>x.round===n);
      if(!e) return '<td style="text-align:center" class="muted">-</td>';
      const col=e.res==='승'?'var(--green)':(e.res==='패'?'var(--red)':'#888');
      const arrow=(()=>{
        const prev=rec.find(x=>x.round===n-1);
        if(!prev||!prev.rank||!e.rank)return '';
        if(e.rank<prev.rank)return `<span style="color:var(--green);font-size:10px">▲${prev.rank-e.rank}</span>`;
        if(e.rank>prev.rank)return `<span style="color:var(--red);font-size:10px">▼${e.rank-prev.rank}</span>`;
        return '<span style="color:#bbb;font-size:10px">-</span>';
      })();
      return `<td style="text-align:center;line-height:1.35">
        <div style="font-weight:800;color:${col};font-size:14px">${fmt(e.cum)}</div>
        <div style="font-size:11px;color:#999">${e.res?e.res:'·'} ${e.gained>0?'+'+fmt(e.gained):''}</div>
        <div>${e.rank?`<span style="font-size:10px;color:#aaa">${e.rank}위</span> ${arrow}`:''}</div>
      </td>`;
    }).join('');
    return `<tr style="opacity:${s.player.active===false?.5:1}">
      <td style="text-align:center;font-weight:800;color:${i<3?'var(--gold)':'var(--ink)'}">${i+1}</td>
      <td style="font-weight:700;white-space:nowrap">${esc(s.player.name)}
        ${s.player.group?`<span class="pen-tag w" style="margin-left:4px">${esc(s.player.group)}</span>`:''}</td>
      ${cells}
      <td style="text-align:center;font-weight:800;color:var(--green);font-size:15px">${fmt(s.score)}</td>
    </tr>`;
  }).join('');

  return `<div class="card">
    <div class="stitle">📈 라운드별 누적 점수 · 순위 변동</div>
    <div class="hint">각 칸의 <b>큰 숫자</b>는 그 라운드까지의 누적 승점, 아래는 그 라운드 결과와 획득 점수, 맨 아래는 그 시점 순위와 전 라운드 대비 변동입니다.</div>
    ${gBtns}
    <div class="overflow"><table style="font-size:13px">${head}${rows||'<tr><td colspan="9" class="muted" style="padding:16px">해당 부문 선수가 없습니다.</td></tr>'}</table></div>
  </div>

  <div class="card">
    <div class="stitle">🔍 선수별 상세</div>
    <div class="hint">선수를 고르면 라운드마다 누구와 어떤 색으로 두어 어떤 결과였는지 확인할 수 있습니다.</div>
    <select onchange="S.progPid=this.value;render()" style="padding:8px 12px;border:1px solid var(--line);border-radius:8px;font-size:14px;min-width:200px">
      <option value="">선수 선택…</option>
      ${(t.players||[]).map(p=>`<option value="${p.id}" ${S.progPid===p.id?'selected':''}>${esc(p.name)}${p.group?' ('+esc(p.group)+')':''}</option>`).join('')}
    </select>
    ${S.progPid&&prog[S.progPid]?(()=>{
      const p=(t.players||[]).find(x=>x.id===S.progPid);
      const rec=prog[S.progPid];
      return `<div class="overflow" style="margin-top:12px"><table style="font-size:13px">
        <tr><th>라운드</th><th>상대</th><th style="text-align:center">결과</th><th style="text-align:center">획득</th><th style="text-align:center">누적</th><th style="text-align:center">순위</th></tr>
        ${rec.map(e=>`<tr>
          <td style="font-weight:700">${e.round}R</td>
          <td>${esc(e.opp)||'-'}</td>
          <td style="text-align:center;font-weight:700;color:${e.res==='승'?'var(--green)':(e.res==='패'?'var(--red)':'#888')}">${e.res||'미입력'}</td>
          <td style="text-align:center">${e.gained>0?'+'+fmt(e.gained):'0'}</td>
          <td style="text-align:center;font-weight:800;color:var(--green)">${fmt(e.cum)}</td>
          <td style="text-align:center">${e.rank?e.rank+'위':'-'}</td>
        </tr>`).join('')}
      </table></div>`;
    })():''}
  </div>`;
}

function viewStandings(t){
  const rounds=t.rounds||[];
  /* 라운드 선택: null이면 현재(최종) */
  const sel=(S.standRound&&S.standRound<=rounds.length)?S.standRound:null;
  const view=sel?{...t, rounds:rounds.filter(r=>r.number<=sel)}:t;
  const {list, tb, criteria}=rankPlayers(view);
  /* 직전 라운드 순위(변동 표시용) */
  let prevRank={};
  if(sel&&sel>1){
    const pv=rankPlayers({...t, rounds:rounds.filter(r=>r.number<=sel-1)});
    pv.list.forEach((s,i)=>{ prevRank[s.player.id]=i+1; });
  } else if(!sel && rounds.length>1){
    const pv=rankPlayers({...t, rounds:rounds.filter(r=>r.number<=rounds.length-1)});
    pv.list.forEach((s,i)=>{ prevRank[s.player.id]=i+1; });
  }

  const rBtns=rounds.length?`<div class="row" style="gap:4px;margin-bottom:12px;flex-wrap:wrap">
    <span class="muted" style="font-size:12px;align-self:center;margin-right:4px">시점</span>
    ${rounds.map(r=>`<button class="pill ${sel===r.number?'on':''}" onclick="S.standRound=${r.number};render()">${r.number}R 종료</button>`).join('')}
    <button class="pill ${sel?'':'on'}" onclick="S.standRound=null;render()">현재</button>
  </div>`:'';

  /* 부문 필터 */
  const allGroups=[...new Set((t.players||[]).map(p=>p.group).filter(Boolean))];
  const gf=S.standGroup||'';
  const gBtns=allGroups.length?`<div class="row" style="gap:4px;margin-bottom:12px;flex-wrap:wrap">
    <span class="muted" style="font-size:12px;align-self:center;margin-right:4px">부문</span>
    <button class="pill ${gf?'':'on'}" onclick="S.standGroup='';render()">전체</button>
    ${allGroups.map(g=>`<button class="pill ${gf===g?'on':''}" onclick="S.standGroup='${esc(g)}';render()">${esc(g)}</button>`).join('')}
  </div>`:'';

  const shown=list.filter(s=>!gf||s.player.group===gf);
  const cols=criteria.filter(k=>k!=='direct'&&k!=='score');
  const lbl={buchholz:'Buch', buchholzCut1:'Buch-1', sonneborn:'SB', wins:'Wins', blacks:'흑번'};
  const head=`<tr><th>순위</th><th>선수</th><th>레이팅</th><th style="color:var(--green)">승점</th>${cols.map(k=>`<th class="muted">${lbl[k]}</th>`).join('')}</tr>`;
  const rows=shown.map((s,i)=>{
    const pr=prevRank[s.player.id];
    const mv=pr?(pr>i+1?`<span style="color:var(--green);font-size:10px">▲${pr-(i+1)}</span>`
      :(pr<i+1?`<span style="color:var(--red);font-size:10px">▼${(i+1)-pr}</span>`:'<span style="color:#ccc;font-size:10px">-</span>')):'';
    return `
    <tr class="${i<3?'top3':''}" style="opacity:${s.player.active===false?.5:1}">
      <td class="rank">${i+1} ${mv}</td>
      <td style="font-weight:700">${esc(s.player.name)}
        ${s.player.group?`<span class="pen-tag w" style="margin-left:4px">${esc(s.player.group)}</span>`:''}
        ${s.player.active===false?' <span style="color:var(--red);font-size:12px">기권</span>':''}</td>
      <td class="muted">${s.player.rating||'-'}</td>
      <td class="score">${fmt(s.score)}</td>
      ${cols.map(k=>{
        if(k==='wins'){
          const b=tb[s.player.id]?.byes||0;
          return `<td class="muted">${fmt(tb[s.player.id]?.wins)}${b?`<span style="color:var(--gold);font-size:11px" title="부전승 ${b}회 포함"> (F${b})</span>`:''}</td>`;
        }
        return `<td class="muted">${fmt(tb[s.player.id]?.[k])}</td>`;
      }).join('')}
    </tr>`;
  }).join('');
  const order=criteria.map((k,i)=>`${i+1}. ${TIEBREAK_DEFS.find(d=>d.key===k)?.label||k}`).join('  →  ');
  return `<div class="card">
    <div class="stitle">🏆 순위표
      <span class="muted">${sel?`${sel}라운드 종료 시점`:'현재'} · 승점 ${fmt(t.scoring.win)}·${fmt(t.scoring.draw)}·${fmt(t.scoring.loss)} 적용</span></div>
    ${rBtns}${gBtns}
    <div class="overflow"><table>${head}${rows||'<tr><td colspan="9" class="muted" style="padding:16px">결과가 입력되면 순위가 계산됩니다.</td></tr>'}</table></div>
    <div class="muted" style="font-size:12px;margin-top:10px">순위 결정 순서: ${order} → 동률 시 레이팅</div>
    <div class="muted" style="font-size:12px;margin-top:4px">순위 옆 ▲▼는 직전 라운드 대비 변동입니다.</div>
  </div>`;
}

function viewExport(t){
  return `<div class="card">
    <div class="stitle">⬇ 내보내기 (스위스매니저 · 체스리절트 연계)</div>
    <div class="hint">체스리절트(chess-results.com) 게시는 스위스매니저 정품을 통해서만 가능합니다. 아래 파일을 내려받아 스위스매니저에 옮겨 입력한 뒤 업로드하세요. 선수 명단은 스위스매니저의 엑셀 가져오기로 바로 불러올 수 있습니다.</div>
    <div class="row" style="gap:10px">
      <button class="btn-p" onclick="exportPlayers()">📋 선수 명단 (.xlsx)</button>
      <button class="btn-p" onclick="exportResults()">⚔ 라운드별 결과 (.xlsx)</button>
      <button class="btn-p" onclick="exportStandings()">🏆 최종 순위표 (.xlsx)</button>
